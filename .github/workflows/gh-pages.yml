name: github pages

on:
  push:
    branches:
    - master

jobs:
  build-deploy:
    runs-on: ubuntu-20.04
    steps:
      - name: Check out
        uses: actions/checkout@v2
        with:
          submodules: true

      # - name: Setup emacs
      #   uses: purcell/setup-emacs@master
      #   with:
      #     version: 26.3

      # - name: Install Emacs
      #   run: sudo apt install emacs-nox --yes

      # - name: Clone Org-mode exporter
      #   run: git clone https://github.com/kaushalmodi/ox-hugo.git ox-hugo

      # - name: Export Org file to Markdown
      #   run: emacs ./posts.org --batch -L ./ox-hugo -l ox-hugo.el --eval='(org-hugo-export-wim-to-md t)' --kill

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.68.3'
          extended: true

      - name: Build
        run: hugo --minify --theme=hello-friend-ng

      # - name: Deploy
      #   uses: peaceiris/actions-gh-pages@v3
      #   env:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_branch: gh-pages
      #     publish_dir: ./public

      - name: Deploy generated content to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: public
