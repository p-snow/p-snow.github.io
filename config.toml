baseurl      = "https://p-snow.github.io/"
title        = "90% Hindsight"
languageCode = "ja"
theme        = "hello-friend-ng"
paginate     = 10

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Subtitle for home
  homeSubtitle = "p-snow a.k.a. こなゆき"

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = true

  # Metadata mostly used in document's head
  description = "p-snow's blog"
  keywords = "homepage, blog"
  images = [""]

  [[params.social]]
    name = "github"
    url = "https://github.com/p-snow/"

  [[params.social]]
    name = "twitter"
    url = "https://twitter.com/_p_snow"

  [[params.social]]
    name = "youtube"
    url = "https://www.youtube.com/channel/UCil00Omw-sZ_4uMoVmvfuSQ"

[taxonomies]
    category = "blog"
    tag      = "tags"
    series   = "series"

[languages]
  [languages.en]
    title = "90% Hindsight"
    subtitle = "p-snow a.k.a. こなゆき"
    keywords = ""
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "tree ../.."
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"

  # And you can even create generic menu
  [[menu.main]]
    identifier = "emacs"
    name       = "Emacs"
    url        = "/emacs/emacs-info"

  [[menu.main]]
    identifier = "blog"
    name       = "Blog"
    url        = "/posts"
